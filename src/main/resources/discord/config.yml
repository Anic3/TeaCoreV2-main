# ======================
# BOT AUTHENTICATION
# ======================
token: "YOUR_DISCORD_BOT_TOKEN"
guild-id: "YOUR_GUILD_ID"

# ======================
# BOT INSTANCE SETTINGS
# ======================
bot-settings:
  # IMPORTANT (MULTI-SERVER SETUP)
  # If you are running this plugin on multiple Minecraft servers
  # (Redis / Bungee / Velocity / multi-instance),
  # ONLY ONE server should enable the Discord bot.
  #
  # Reasons:
  # - Prevent duplicate Discord bots
  # - Avoid activity/status conflicts
  # - Prevent Discord rate-limit issues

  # ======================
  # BOT ONLINE STATUS
  # ======================
  # Possible values:
  # ONLINE | IDLE | DND | INVISIBLE
  status: ONLINE

  # ======================
  # BOT ACTIVITY
  # ======================
  activity:
    # Text displayed under the bot name
    # PlaceholderAPI placeholders are supported
    text: "cùng %server_online% người chơi"

    # Possible values:
    # PLAYING | WATCHING | LISTENING | COMPETING
    type: PLAYING

  # ======================
  # ACTIVITY UPDATE INTERVAL
  # ======================
  # How often the bot activity should be updated (in seconds)
  # Recommended minimum: 60 seconds
  update-interval: 60

# ======================
# LINK SYSTEM
# ======================
link:
  # Enable or disable the link system
  enabled: true

  # ======================
  # LINK CODE SETTINGS
  # ======================
  code:
    # Length of the generated link code
    length: 6

    # How long a code is valid (in seconds)
    # Example: 300 = 5 minutes
    expire-seconds: 300

    # Characters used to generate codes
    # Avoid confusing characters like O, 0, I, l
    charset: "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

  # ======================
  # LINK REWARDS
  # ======================
  rewards:
    # ======================
    # COMMAND REWARDS
    # ======================
    execute-commands:
      enabled: true

      # Placeholders:
      # %player%  -> Minecraft player name
      # %uuid%    -> Minecraft UUID
      # %discord% -> Discord user ID
      commands:
        - "lp user %player% group add plus"

# ======================
# ROLE SYNC SETTINGS
# ======================
role-sync:
  mc-to-discord:
    enabled: true

    groups:
      plus: "2345678901"
      vie: "1433652871563313283"
      vieplus: "1433905617688596572"
      viegod: "1433905930726281257"
      vieking: "1433906313749991524"
      media: "1433906550224982187"

  discord-to-mc:
    enabled: true

    # If true:
    # - All Minecraft ranks mapped below will be REMOVED
    #   when the player has NOT linked their Discord account.
    # - Prevents abusing Discord roles to gain in-game ranks/rewards.
    #
    # Recommended: true
    enforce-unlinked-cleanup: true

    roles:
      "1330840289991987261": "booster"


# ======================
# UNLINK SETTINGS
# ======================
unlink:
  # How long a player has to wait before being able to unlink
  # Set to 0 to disable cooldown
  # Time in seconds (604800 = 7 days)
  cooldown: 604800

  # Reset the player's nickname after unlink
  # If false, the nickname will be kept as-is
  nickname-reset: true

  # Execute server commands after unlink
  execute-commands: true

  # Commands executed when a player unlinks
  # Placeholders:
  # %player%  -> Minecraft player name
  # %uuid%    -> Minecraft UUID
  # %discord% -> Discord user ID
  server-commands:
    - "lp user %player% group remove plus"
    
commands:
  panel:
    # Enable or disable the /panel command
    enabled: true

    # List of Discord ROLE IDs allowed to use /panel
    # - Leave empty [] to allow all roles
    # - Use ROLE ID, not role name
    allowed-roles:
      - 1317115057301094462

    # List of Discord CHANNEL IDs where /panel can be used
    # - Leave empty [] to allow usage in all channels
    # - If specified, the command will only work in these channels
    allowed-channels:
      - 1422805354013790218