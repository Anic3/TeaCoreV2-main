# ======================================================
#                    MESSAGE STRUCTURE
# ======================================================
#   message_name:                  # Unique identifier for the message
#     enabled: true/false          # Enable or disable the entire message (default: true)
#     message: "Text content"      # Main chat message (optional)
#     title: "Title text"          # Title display (optional)
#     subtitle: "Subtitle text"    # Subtitle display (optional)
#     action_bar: "Text"           # Action bar text (optional)
#     sound: sound.effect          # Sound to play (optional)
#     fade_in: 10                  # Title fade-in time (ticks)
#     stay: 40                     # Title stay time (ticks)
#     fade_out: 10                 # Title fade-out time (ticks)
#
# All messages use MiniMessage format:
#   https://docs.advntr.dev/minimessage/format.html
#
# PlaceholderAPI placeholders are supported (e.g., %player%, %target%)
# ======================================================
